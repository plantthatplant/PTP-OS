# fly.toml app configuration file generated for ptp-os on 2026-06-29T18:10:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ptp-os'
primary_region = 'ams'

[build]

[env]
  GAIA_APP_DATA_DIR = '/data/app'
  GAIA_DATA_DIR = '/data'
  GAIA_HOST = '0.0.0.0'
  GAIA_PORT = '8000'
  GAIA_SOURCE = 'fixture'

[[mounts]]
  source = 'gaia_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
