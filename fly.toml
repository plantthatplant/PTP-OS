# Fly.io config for the Gaia API. Rename `app` to your own, then: fly launch --no-deploy ; fly deploy.
app = "gaia-api"
primary_region = "arn"            # Stockholm — close to Kålaberga

[build]

[http_service]
  internal_port = 8000
  force_https = true               # public URL is https://<app>.fly.dev  → give Lovable <that>/api/v1
  auto_stop_machines = "off"       # stay always-on so the collector loop + /health keep running
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "gaia_data"             # fly volumes create gaia_data --size 1
  destination = "/data"

[env]
  GAIA_HOST = "0.0.0.0"
  GAIA_PORT = "8000"
  GAIA_DATA_DIR = "/data"
  GAIA_APP_DATA_DIR = "/data/app"  # persists Memory / Learning / Observations across deploys
  GAIA_SOURCE = "fixture"          # until live Synopta data can reach the host (see deploy doc)
